name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate plugin.json
        run: |
          if [ ! -f .claude-plugin/plugin.json ]; then
            echo "ERROR: .claude-plugin/plugin.json not found"
            exit 1
          fi
          # Validate JSON is parseable
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          # Verify version in plugin.json matches tag
          PLUGIN_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PLUGIN_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: plugin.json version ($PLUGIN_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version: $PLUGIN_VERSION"

      - name: Validate marketplace.json against Claude Code schema
        # Schema: https://code.claude.com/docs/en/plugin-marketplaces.md#marketplace-schema
        # Required top-level: name (str), owner (object with .name str), plugins (array)
        # Each plugin entry requires: name (str), source (str | object)
        # Plugin entry version (if present) must match plugin.json version + tag.
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import json, os, sys

          with open('.claude-plugin/marketplace.json') as f:
              m = json.load(f)
          with open('.claude-plugin/plugin.json') as f:
              p = json.load(f)

          tag = os.environ.get('TAG_REF', '').lstrip('v')
          errors = []

          # top-level required
          if not isinstance(m.get('name'), str) or not m['name']:
              errors.append('marketplace.json: missing or non-string top-level "name"')
          if not isinstance(m.get('owner'), dict):
              errors.append('marketplace.json: missing top-level "owner" object')
          elif not isinstance(m['owner'].get('name'), str) or not m['owner']['name']:
              errors.append('marketplace.json: owner.name must be a non-empty string')
          if not isinstance(m.get('plugins'), list) or len(m['plugins']) == 0:
              errors.append('marketplace.json: "plugins" must be a non-empty array')

          # per-plugin entry
          for idx, entry in enumerate(m.get('plugins') or []):
              prefix = f'marketplace.json plugins[{idx}]'
              if not isinstance(entry.get('name'), str) or not entry['name']:
                  errors.append(f'{prefix}: missing or non-string "name"')
              src = entry.get('source')
              if not (isinstance(src, str) and src) and not isinstance(src, dict):
                  errors.append(f'{prefix}: missing "source" (string or object)')
              # if plugin entry has version, it must align with plugin.json + tag
              if 'version' in entry and entry['version'] != p.get('version'):
                  errors.append(
                      f'{prefix}: version "{entry["version"]}" does not match '
                      f'plugin.json version "{p.get("version")}"'
                  )
              if tag and 'version' in entry and entry['version'] != tag:
                  errors.append(
                      f'{prefix}: version "{entry["version"]}" does not match tag "{tag}"'
                  )

          # marketplace metadata.version (optional) must align if present
          meta = m.get('metadata') or {}
          if 'version' in meta and meta['version'] != p.get('version'):
              errors.append(
                  f'marketplace.json metadata.version "{meta["version"]}" does not match '
                  f'plugin.json version "{p.get("version")}"'
              )

          # plugin.json must NOT declare the standard hooks/hooks.json file —
          # Claude Code auto-discovers it; declaring it triggers
          # "Duplicate hooks file detected: ... resolves to already-loaded file"
          # on /reload-plugins (Plugin error in /doctor). The hooks.json file
          # must still exist on disk; only the manifest declaration must be
          # absent. manifest.hooks may still be used to point at NON-standard
          # additional hook files (e.g. hooks/extra.json), but the standard
          # path is forbidden.
          plugin_hooks = p.get('hooks')
          if plugin_hooks in ('./hooks/hooks.json', 'hooks/hooks.json'):
              errors.append(
                  'plugin.json: must NOT declare standard hooks/hooks.json — '
                  'it is auto-discovered. Remove the "hooks" field; the '
                  'hooks/hooks.json file itself stays on disk.'
              )

          # The standard hooks/hooks.json file MUST exist on disk so Claude
          # Code's auto-discovery finds it. Without this file the SessionStart
          # + UserPromptSubmit polling fallback (REQ-014) is silently absent.
          if not os.path.isfile('hooks/hooks.json'):
              errors.append(
                  'hooks/hooks.json missing — REQ-014 polling fallback would '
                  'not register. Add the file (do not declare it in plugin.json).'
              )

          if errors:
              print('SCHEMA VALIDATION FAILED:')
              for e in errors:
                  print('  -', e)
              sys.exit(1)
          print('marketplace.json schema OK; versions in lockstep with tag', tag)
          PY

      - name: Validate skills exist
        run: |
          # All v0.2.0+ skills — must exist on disk before the marketplace
          # plugin is published. Update this list when adding/removing skills.
          for skill in install sync status reflect propose_update reflect_and_propose; do
            if [ ! -f "skills/$skill/SKILL.md" ]; then
              echo "ERROR: skills/$skill/SKILL.md not found"
              exit 1
            fi
          done
          echo "All 6 skills present"

      - name: Validate SKILL.md state-machine completeness
        # /au:install drives a state machine; every named state must appear
        # in the skill body so Claude can branch correctly. Missing any one
        # state is a regression — Claude silently falls through to a default
        # that does not match the user's situation. The v0.2.0..0.2.2
        # pending-not-resending bug is the canonical example.
        run: |
          python3 - <<'PY'
          import sys

          install = open('skills/install/SKILL.md').read()
          status_md = open('skills/status/SKILL.md').read()
          sync_md = open('skills/sync/SKILL.md').read()

          INSTALL_STATES = [
              'IDENTITY_ABSENT',
              'REGISTRY_ACTIVE',
              'REGISTRY_PENDING_RESEND',
              'REGISTRY_REVOKED',
              'REGISTRY_RESET',
              'IDENTITY_ORPHANED',
              'REMOTE_ERROR',
          ]
          STATUS_STATES = [
              'IDENTITY_ABSENT',
              'REGISTRY_ACTIVE',
              'REGISTRY_PENDING',
              'REGISTRY_REVOKED',
              'REGISTRY_RESET',
              'IDENTITY_ORPHANED',
              'REMOTE_ERROR',
          ]
          SYNC_STATES = ['IDENTITY_ABSENT', 'REGISTRY_PENDING', 'REGISTRY_REVOKED']

          errors = []
          for s in INSTALL_STATES:
              if install.count(s) < 2:
                  errors.append(
                      f'install/SKILL.md: state "{s}" appears '
                      f'{install.count(s)}× — expected ≥2 (resolution table + action heading)'
                  )

          for s in STATUS_STATES:
              if s not in status_md:
                  errors.append(f'status/SKILL.md: missing state "{s}"')
          for s in SYNC_STATES:
              if s not in sync_md:
                  errors.append(f'sync/SKILL.md: missing state "{s}"')

          # Pending-resend hint propagation (the 1h TTL recovery path).
          if '/au:install' not in status_md or 'fresh link' not in status_md.lower():
              errors.append('status/SKILL.md: pending branch must point at /au:install for resend')
          if '/au:install' not in sync_md or 'fresh link' not in sync_md.lower():
              errors.append('sync/SKILL.md: pending branch must point at /au:install for resend')

          # sha256 truncate convention (16 hex chars) documented in all 3 skills.
          for label, src in [
              ('install', install), ('status', status_md), ('sync', sync_md)
          ]:
              if 'sha256(absolute(cwd))' not in src:
                  errors.append(f'{label}/SKILL.md: missing sha256(absolute(cwd)) wording')
              if '16 hex' not in src and 'slice(0, 16)' not in src and 'slice(0,16)' not in src:
                  errors.append(f'{label}/SKILL.md: missing 16-hex truncation note')

          if errors:
              print('SKILL state-machine validation FAILED:')
              for e in errors:
                  print('  -', e)
              sys.exit(1)
          print('skills/install/SKILL.md: all 7 states present')
          print('skills/status/SKILL.md: all 7 states present + resend hint')
          print('skills/sync/SKILL.md: all 3 states present + resend hint')
          print('truncate convention documented in all 3 skills')
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
